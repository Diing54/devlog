# Define upstream backends — names match docker-compose service names
upstream backend_upstream {
    server backend:3000;
    keepalive 32;  # reuse connections to backend (performance)
}

upstream frontend_upstream {
    server frontend:80;
    keepalive 16;
}

server {
    listen 80;
    server_name _;  # match any hostname

    # Request size limit — reject huge bodies early
    client_max_body_size 1m;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # Standard proxy headers — tell backends the real client IP/protocol
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";  # enable keepalives to upstream

    # /api/* routes → backend Node.js API
    location /api/ {
        proxy_pass http://backend_upstream;
    }

    # /health → backend health check endpoint
    location /health {
        proxy_pass http://backend_upstream;
    }

    # Everything else → React frontend
    location / {
        proxy_pass http://frontend_upstream;
    }
}
