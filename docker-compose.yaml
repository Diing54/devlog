services:
  # ── Nginx: public entry point ──────────────────────────────────
  devlog_nginx:
    image: nginx:1.31-alpine
    container_name: devlog_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    ports:
      - "8080:80" # Maps local port 8080 to Nginx
    restart: unless-stopped
    networks:
      - devlog_internal

  # ── Frontend: React SPA served by nginx ────────────────────────
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devlog_frontend
    restart: unless-stopped
    networks:
      - devlog_internal

  # ── Backend: Node.js REST API ───────────────────────────────────
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: devlog_backend
    env_file: .env
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - devlog_internal

  # ── PostgreSQL: persistent storage ─────────────────────────────
  postgres:
    image: postgres:18-alpine
    container_name: devlog_postgres
    env_file: .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped
    networks:
      - devlog_internal

  # ── Redis: caching layer ────────────────────────────────────────
  redis:
    image: redis:8-alpine
    container_name: devlog_redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - devlog_internal

volumes:
  postgres_data:
  redis_data:

networks:
  devlog_internal:
    driver: bridge
