services:
  # ── Nginx: public entry point ──────────────────────────────────
  devlog_nginx:
    image: nginx:1.25-alpine
    container_name: devlog_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - homelab_net # Connects to Cloudflare Tunnel
      - devlog_internal   # Connects to backend/frontend

  # ── Frontend: React SPA served by nginx ────────────────────────
  frontend:
    image: ghcr.io/diing54/devlog/frontend:latest
    container_name: devlog_frontend
    restart: unless-stopped
    networks:
      - devlog_internal

  # ── Backend: Node.js REST API ───────────────────────────────────
  backend:
    image: ghcr.io/diing54/devlog/backend:latest
    container_name: devlog_backend
    env_file: .env
    environment:
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - devlog_internal

  # ── PostgreSQL: persistent storage ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: devlog_postgres
    env_file: .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - devlog_internal

  # ── Redis: caching layer ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: devlog_redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - devlog_internal

volumes:
  postgres_data:
  redis_data:

networks:
  homelab_net:
    external: true
  devlog_internal:
    driver: bridge
